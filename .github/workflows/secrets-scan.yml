# API Keys, sensitive data, credentails
# GitLeaks 
name: Secrets scan

on:
    workflow_call:

jobs: 
    secrets-scan:
        runs-on: ubuntu-latest

        steps:
            - name: checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
            
            - name: Run GitLeaks scanner
              uses: gitleaks/gitleaks-action@v3
              env:
                 GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          