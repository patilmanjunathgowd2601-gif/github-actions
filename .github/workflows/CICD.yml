# this is the name of the workflow that will be displayed on the action tab
name : CICD

# manula click [deliver] workflow whenever user needs
on:
  workflow_dispatch:

jobs: 

  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code clone from GitHub"

  build: 
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build Docker Container 
        run: echo "Docker Container build"
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container 
        run: echo "Testing the Container"

  deploy:
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy the app 
        run: echo "Docker compose deployed the app"
  
      
