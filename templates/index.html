<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANJUNATH</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:#fff;
}
.container{text-align:center;}
h1{color:#38bdf8;margin-bottom:10px;}
.badge{
    display:inline-block;
    padding:6px 14px;
    border:1px solid #38bdf8;
    border-radius:20px;
    margin-bottom:25px;
}
.status{
    display:flex;
    gap:12px;
    justify-content:center;
    flex-wrap:wrap;
}
.status div{
    padding:10px 18px;
    border:1px solid #334155;
    border-radius:8px;
    background:#1e293b;
}
.ok{color:#22c55e;font-weight:bold;}
</style>
</head>

<body>
<div class="container">
    <h1>DevOps Zero To Hero</h1>
    <div class="badge">Josh Batch 10</div>

    <div class="status">
        <div>🛠 Build <span class="ok">✔</span></div>
        <div>🧪 Test <span class="ok">✔</span></div>
        <div>🔍 Lint <span class="ok">✔</span></div>
        <div>🚀 Deploy <span class="ok">✔</span></div>
    </div>

    <p style="margin-top:20px;color:#94a3b8;">
        Automated with <strong>GitHub Actions</strong>
    </p>
</div>
</body>
</html>
